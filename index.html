<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Haxball — Tabla de Posiciones</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --border: rgba(255,255,255,0.08); --text: #f0f0f5; --text-muted: #8888a0;
    --purple: #7F77DD; --purple-dark: #534AB7; --green: #1D9E75; --red: #D85A30;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--text-muted); }
  .badge { display: inline-block; background: var(--purple-dark); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 10px; }
  .pin-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 2rem; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .pin-section label { font-size: 13px; color: var(--text-muted); }
  .pin-section input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 13px; width: 140px; letter-spacing: 2px; }
  .pin-status { font-size: 12px; }
  .pin-ok { color: #1D9E75; }
  .pin-err { color: #D85A30; }
  .edit-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 2rem; display:none; }
  .edit-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  .edit-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
  select, input[type=number] { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 13px; }
  input[type=number] { width: 60px; text-align: center; }
  button { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; }
  button:hover { background: var(--surface2); }
  button.primary { background: var(--purple); border-color: var(--purple-dark); color: #fff; }
  button.primary:hover { background: var(--purple-dark); }
  .match-log { margin-top: 12px; font-size: 12px; color: var(--text-muted); line-height: 1.8; }
  .groups { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .group-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .group-header h2 { font-size: 14px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text-muted); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 8px 6px; font-size: 11px; font-weight: 500; color: var(--text-muted); text-align: center; border-bottom: 1px solid var(--border); }
  thead th.left { text-align: left; padding-left: 12px; }
  tbody td { padding: 9px 6px; text-align: center; border-bottom: 1px solid var(--border); }
  tbody td.name { text-align: left; padding-left: 12px; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.leader { background: rgba(127,119,221,0.08); }
  .team-name { font-weight: 500; font-size: 13px; }
  .team-leader { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .pts { font-weight: 600; color: var(--purple); }
  .diff-pos { color: #1D9E75; font-weight: 500; }
  .diff-neg { color: #D85A30; font-weight: 500; }
  .diff-zero { color: var(--text-muted); }
  .pos { color: var(--text-muted); font-size: 12px; }
  .star { color: #EF9F27; font-size: 12px; margin-right: 2px; }
  .fixture { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 2rem; }
  .fixture h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  .match-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 8px; }
  .match-item:last-child { border-bottom: none; }
  .match-time { color: var(--purple); font-weight: 500; min-width: 50px; font-size: 12px; }
  .match-teams { flex: 1; text-align: center; }
  .match-status { font-size: 11px; color: var(--text-muted); min-width: 60px; text-align: right; }
  .match-done { color: #1D9E75; }
  .loading { text-align:center; color: var(--text-muted); font-size:13px; padding: 2rem; }
  footer { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 2rem; }
</style>
</head>
<body>
<div class="header">
  <span class="badge">⚽ Torneo Haxball</span>
  <h1>Tabla de Posiciones</h1>
  <p id="last-update">Cargando...</p>
</div>
<div class="pin-section">
  <label>PIN admin:</label>
  <input type="password" id="pin-input" placeholder="••••••" oninput="checkPin()">
  <span class="pin-status" id="pin-status"></span>
</div>
<div class="edit-section" id="edit-section">
  <h3>Cargar resultado</h3>
  <div class="edit-row">
    <select id="t1"></select>
    <input type="number" id="g1" min="0" value="0">
    <span style="color:var(--text-muted)">vs</span>
    <input type="number" id="g2" min="0" value="0">
    <select id="t2"></select>
    <button class="primary" onclick="addResult()">Agregar resultado</button>
    <button onclick="resetAll()">Reiniciar todo</button>
  </div>
  <div class="match-log" id="match-log"></div>
</div>
<div class="loading" id="loading">Cargando resultados...</div>
<div class="groups" id="tables" style="display:none"></div>
<div class="fixture" id="fixture-section" style="display:none">
  <h3>Fixture — Fase de grupos</h3>
  <div id="fixture-list"></div>
</div>
<footer>Torneo Haxball · Actualización en tiempo real</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>
<script>
const PIN = '316619';
firebase.initializeApp({ databaseURL: 'https://haxball-torneo-default-rtdb.firebaseio.com' });
const matchesRef = firebase.database().ref('matches');

const GROUPS = { 'Grupo 1': ['Grupo A','Grupo B','Grupo C'], 'Grupo 2': ['Grupo D','Grupo E','Grupo F'] };
const ALL_TEAMS = ['Grupo A','Grupo B','Grupo C','Grupo D','Grupo E','Grupo F'];
const LEADERS = { 'Grupo A':'Jugarapido','Grupo B':'Ger','Grupo C':'Almafuerte','Grupo D':'AmadeoNF','Grupo E':'Soul','Grupo F':'rr' };
const FIXTURE = [
  {time:'22:30',t1:'Grupo A',t2:'Grupo B'},{time:'22:45',t1:'Grupo D',t2:'Grupo E'},
  {time:'23:00',t1:'Grupo A',t2:'Grupo C'},{time:'23:15',t1:'Grupo D',t2:'Grupo F'},
  {time:'23:30',t1:'Grupo B',t2:'Grupo C'},{time:'23:45',t1:'Grupo E',t2:'Grupo F'}
];
let stats={}, matches=[];

function initStats(){ ALL_TEAMS.forEach(t=>{stats[t]={pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};}); }
function getGroup(t){ for(const [g,ts] of Object.entries(GROUPS)) if(ts.includes(t)) return g; }

function checkPin(){
  const v=document.getElementById('pin-input').value;
  const s=document.getElementById('pin-status');
  if(v===PIN){ s.textContent='✓ Acceso admin'; s.className='pin-status pin-ok'; document.getElementById('edit-section').style.display='block'; }
  else { s.textContent=v.length>0?'PIN incorrecto':''; s.className='pin-status pin-err'; document.getElementById('edit-section').style.display='none'; }
}

function addResult(){
  const t1=document.getElementById('t1').value, t2=document.getElementById('t2').value;
  const g1=parseInt(document.getElementById('g1').value)||0, g2=parseInt(document.getElementById('g2').value)||0;
  if(t1===t2){alert('Elegí dos equipos distintos');return;}
  if(getGroup(t1)!==getGroup(t2)){alert('Solo partidos del mismo grupo');return;}
  matchesRef.push({t1,t2,g1,g2,ts:Date.now()});
  document.getElementById('g1').value=0; document.getElementById('g2').value=0;
}

function resetAll(){ if(!confirm('¿Reiniciar todos los resultados?')) return; matchesRef.remove(); }

function recalc(){
  initStats();
  matches.forEach(({t1,t2,g1,g2})=>{
    stats[t1].pj++; stats[t2].pj++;
    stats[t1].gf+=g1; stats[t1].gc+=g2; stats[t2].gf+=g2; stats[t2].gc+=g1;
    if(g1>g2){stats[t1].pg++;stats[t1].pts+=3;stats[t2].pp++;}
    else if(g2>g1){stats[t2].pg++;stats[t2].pts+=3;stats[t1].pp++;}
    else{stats[t1].pe++;stats[t1].pts++;stats[t2].pe++;stats[t2].pts++;}
  });
}

function renderAll(){
  recalc();
  const c=document.getElementById('tables'); c.innerHTML='';
  for(const [grpName,teams] of Object.entries(GROUPS)){
    const sorted=[...teams].sort((a,b)=>{
      if(stats[b].pts!==stats[a].pts) return stats[b].pts-stats[a].pts;
      const da=stats[a].gf-stats[a].gc, db=stats[b].gf-stats[b].gc;
      if(db!==da) return db-da; return stats[b].gf-stats[a].gf;
    });
    const card=document.createElement('div'); card.className='group-card';
    card.innerHTML=`<div class="group-header"><h2>${grpName}</h2></div>`;
    const tbl=document.createElement('table');
    tbl.innerHTML=`<thead><tr><th class="left" style="width:24px"></th><th class="left">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr></thead><tbody></tbody>`;
    const tbody=tbl.querySelector('tbody');
    sorted.forEach((team,i)=>{
      const s=stats[team], dg=s.gf-s.gc;
      const dgC=dg>0?'diff-pos':dg<0?'diff-neg':'diff-zero';
      const dgS=dg>0?'+'+dg:String(dg);
      const leader=i===0&&s.pj>0;
      const tr=document.createElement('tr'); if(leader) tr.className='leader';
      tr.innerHTML=`<td class="pos">${i+1}</td><td class="name"><div class="team-name">${leader?'<span class="star">★</span>':''}${team}</div><div class="team-leader">${LEADERS[team]}</div></td><td>${s.pj}</td><td>${s.pg}</td><td>${s.pe}</td><td>${s.pp}</td><td>${s.gf}</td><td>${s.gc}</td><td class="${dgC}">${s.pj>0?dgS:'—'}</td><td class="pts">${s.pts}</td>`;
      tbody.appendChild(tr);
    });
    card.appendChild(tbl); c.appendChild(card);
  }
  const fl=document.getElementById('fixture-list'); fl.innerHTML='';
  FIXTURE.forEach(({time,t1,t2})=>{
    const p=matches.find(m=>(m.t1===t1&&m.t2===t2)||(m.t1===t2&&m.t2===t1));
    const d=document.createElement('div'); d.className='match-item';
    const r=p?(p.t1===t1?`${p.g1} - ${p.g2}`:`${p.g2} - ${p.g1}`):'vs';
    d.innerHTML=`<span class="match-time">${time}</span><span class="match-teams">${t1} <b>${r}</b> ${t2}</span><span class="match-status${p?' match-done':''}">${p?'Jugado':'Pendiente'}</span>`;
    fl.appendChild(d);
  });
  const log=document.getElementById('match-log');
  log.innerHTML=matches.length?'<b>Resultados:</b><br>'+matches.map(m=>`${m.t1} <b>${m.g1}-${m.g2}</b> ${m.t2}`).join(' · '):'';
  document.getElementById('loading').style.display='none';
  document.getElementById('tables').style.display='grid';
  document.getElementById('fixture-section').style.display='block';
  document.getElementById('last-update').textContent=matches.length?'Última actualización: '+new Date().toLocaleTimeString('es-AR'):'Sin resultados aún';
}

function populateSelects(){
  ['t1','t2'].forEach((id,i)=>{
    const sel=document.getElementById(id);
    ALL_TEAMS.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
    if(i===1) sel.selectedIndex=1;
  });
}

matchesRef.on('value',snap=>{
  matches=[];
  const d=snap.val();
  if(d) Object.values(d).forEach(m=>matches.push(m));
  renderAll();
});
populateSelects();
</script>
</body>
</html>
